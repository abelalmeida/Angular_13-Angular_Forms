<form #form="ngForm" (ngSubmit)="onSubmit(form)">
  <h2>Login</h2>

  <div class="control-row">
    <div class="control no-margin">
      <label for="email">Email</label>
      <!-- add the ngModel directive to the input field -->
      <input id="email" type="email" name="email" ngModel required email #email="ngModel"/>
    </div>

    <div class="control no-margin">
      <label for="password">Password</label>
      <input id="password" type="password" name="password" ngModel required minlength="6"  #password="ngModel"/>
    </div>

    <button class="button">Login</button>
  </div>
  <!-- @if(form.form.controls['email'].touched && form.form.controls['password'].touched && form.form.invalid){ -->
    @if(email.touched && email.invalid && email.dirty){
      <p class="control-error">
    Invalid input - please check your data!
     </p>
 
    }
    @if(password.touched && password.invalid && password.dirty){
      <p class="control-error">
    Invalid input - please check your data!
     </p>   
  } 

</form>
